version: '3'

tasks:
  setup:
    cmds:
      - stow zsh
      - stow p10k
      - stow tig
      - stow nvim
      - stow zellij
      - stow devbox
      - stow lazygit
      - stow ghostty
      - stow claude

  check:
    desc: validate claude config (JSON + shell syntax)
    cmds:
      - jq -e . claude/.claude/settings.json >/dev/null
      - for f in claude/.claude/hooks/*.sh claude/.claude/statusline-command.sh; do bash -n "$f"; done
      - if command -v shellcheck >/dev/null; then shellcheck claude/.claude/hooks/*.sh claude/.claude/statusline-command.sh; fi

  clone-plugins:
    vars:
      ZSH_CUSTOM:
        sh: echo "$HOME/.config/ohmyzsh/custom"
    cmds:
      - mkdir -p $ZSH_CUSTOM/plugins
      - if [ ! -d "$ZSH_CUSTOM/plugins/copyzshell" ]; then git clone git@github.com:rutchkiwi/copyzshell.git $ZSH_CUSTOM/plugins/copyzshell; fi
      - if [ ! -d "$ZSH_CUSTOM/plugins/zsh-peco-history" ]; then git clone git@github.com:jimeh/zsh-peco-history.git $ZSH_CUSTOM/plugins/zsh-peco-history; fi
      - if [ ! -d "$ZSH_CUSTOM/plugins/kubetail" ]; then git clone git@github.com:johanhaleby/kubetail.git $ZSH_CUSTOM/plugins/kubetail; fi

