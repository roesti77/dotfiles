name: harness-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Syntax-check workflow scripts
        # the workflow runtime executes scripts as an async function body,
        # so top-level await/return are legal — wrap before node --check
        run: |
          for f in claude/.claude/workflows/*.js; do
            { printf 'async function wf() {\n'
              sed 's/^export const meta/const meta/' "$f"
              printf '}\n'
            } | node --input-type=module --check \
              || { echo "::error file=$f::syntax error"; exit 1; }
          done

      - name: Lint agent and skill frontmatter
        run: |
          fail=0
          for f in claude/.claude/agents/*.md claude/.claude/skills/*/SKILL.md; do
            # symlinked skills (e.g. hunk-review -> homebrew) resolve only on the host machine
            [ -L "$f" ] && continue
            head -1 "$f" | grep -qx -- '---' \
              || { echo "::error file=$f::missing frontmatter"; fail=1; continue; }
            fm=$(awk '/^---$/{n++; next} n==1{print}' "$f")
            printf '%s\n' "$fm" | grep -q '^name:' \
              || { echo "::error file=$f::frontmatter missing name"; fail=1; }
            printf '%s\n' "$fm" | grep -q '^description:' \
              || { echo "::error file=$f::frontmatter missing description"; fail=1; }
          done
          exit $fail

      - name: Cross-check workflow agentTypes against agents
        run: |
          builtin_types=' Explore Plan general-purpose claude '
          fail=0
          for t in $(grep -hoE "agentType: '[^']+'" claude/.claude/workflows/*.js \
                     | sed "s/agentType: '//; s/'$//" | sort -u); do
            if [ ! -f "claude/.claude/agents/$t.md" ] \
               && ! printf '%s' "$builtin_types" | grep -q " $t "; then
              echo "::error::agentType '$t' resolves to no agents/$t.md and no built-in"
              fail=1
            fi
          done
          exit $fail

      - name: Check harness-internal file references resolve
        # backtick-cited paths into the harness's own tree must exist. reviewee-context
        # paths (spec/, plan.md, AGENTS.md) are the reviewed project's, not ours — excluded.
        run: |
          cd claude/.claude
          fail=0
          for ref in $(grep -rhoE '`(references|rules|hooks|agents|skills|workflows)/[A-Za-z0-9_./-]+`' \
                       agents skills workflows references 2>/dev/null | tr -d '`' | sort -u); do
            if [ ! -e "$ref" ]; then
              echo "::error::dangling harness reference '$ref' — file does not exist"
              fail=1
            fi
          done
          exit $fail

      - name: Check agent citations in skills resolve
        run: |
          cd claude/.claude
          fail=0
          for a in $(grep -rhoE '`(team|decision)-[a-z]+`' skills 2>/dev/null | tr -d '`' | sort -u); do
            if [ ! -f "agents/$a.md" ]; then
              echo "::error::skill cites agent '$a' with no agents/$a.md"
              fail=1
            fi
          done
          exit $fail

      - name: Hook jq-absence contract
        # run each jq-using hook under a PATH with no jq, assert it degrades to its
        # declared `# no-jq:` class (fail-open → exit 0) instead of crashing
        run: |
          cd claude/.claude/hooks
          stub=$(mktemp -d)
          for b in bash sh env printf echo grep sed cat tr sort cut git basename dirname head tail awk mktemp rm ln timeout ps; do
            p=$(command -v "$b" 2>/dev/null) || continue
            case "$p" in /*) ln -s "$p" "$stub/$b" ;; esac  # real binaries only; builtins need no PATH entry
          done
          # jq deliberately not linked into $stub
          fail=0
          probe() { printf '{"hook_event_name":"Stop","cwd":"/tmp","tool_input":{"command":"%s"}}' "$1"; }
          check() {
            hook=$1; input=$2; want=$3
            PATH="$stub" bash "$hook" >/dev/null 2>&1 <<<"$input"; rc=$?
            decl=$(sed -nE 's/^# no-jq: (fail-open|fail-closed).*/\1/p' "$hook" | head -1)
            if [ "$decl" = fail-open ] && [ "$rc" -ne 0 ]; then
              echo "::error file=$hook::declared no-jq: fail-open but exited $rc without jq"; fail=1
            elif [ "$decl" = fail-closed ] && [ "$rc" -eq 0 ]; then
              echo "::error file=$hook::declared no-jq: fail-closed but exited 0 without jq"; fail=1
            elif [ -z "$decl" ]; then
              echo "::error file=$hook::uses jq but has no '# no-jq:' declaration"; fail=1
            fi
          }
          check context-guard.sh "$(probe 'kubectl delete pod x --context=prod')"
          check worktree-guard.sh "$(probe 'git commit -m x')"
          check macos-notify.sh "$(probe '')"
          exit $fail
