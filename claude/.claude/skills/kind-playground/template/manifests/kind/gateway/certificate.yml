---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: localhost-direct-wildcard
  namespace: gateway-system
spec:
  secretName: localhost-direct-wildcard-tls
  duration: 87600h
  dnsNames:
    - "localhost.direct"
    - "*.localhost.direct"
  issuerRef:
    name: mkcert-cluster-issuer
    kind: ClusterIssuer
